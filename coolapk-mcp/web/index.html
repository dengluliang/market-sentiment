<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酷安舆论监测</title>
<style>
:root{--bg:#09090b;--s1:#18181b;--s2:#27272a;--s3:#3f3f46;--bd:#27272a;--bd2:#3f3f46;--t:#fafafa;--t2:#a1a1aa;--t3:#71717a;--g:#22c55e;--gd:rgba(34,197,94,.1);--r:#ef4444;--rd:rgba(239,68,68,.1);--a:#f59e0b;--ad:rgba(245,158,11,.1);--b:#3b82f6;--bd3:rgba(59,130,246,.1);--p:#a855f7;--rs:5px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t);font-size:13px}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1)}
.topbar h1{font-size:14px;font-weight:600}
.topbar h1 em{color:var(--g);font-style:normal}
.topbar-r{display:flex;gap:5px;align-items:center}
.badge{font-size:9px;padding:2px 6px;border-radius:8px;background:var(--bg);border:1px solid var(--bd);color:var(--t2)}
.btn-s{padding:3px 8px;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rs);color:var(--t2);cursor:pointer;font-size:10px;transition:all .12s}
.btn-s:hover{background:var(--s3);color:var(--t)}
.btn-s.active{background:var(--g);color:#000;border-color:var(--g)}

.searchbar{display:flex;align-items:center;gap:6px;padding:7px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.searchbar input{flex:1;min-width:180px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);padding:6px 10px;color:var(--t);font-size:12px;outline:none}
.searchbar input:focus{border-color:var(--g)}
.searchbar select{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);padding:4px 6px;color:var(--t2);font-size:10px}
.searchbar button{padding:6px 14px;background:var(--g);color:#000;font-weight:600;border:none;border-radius:var(--rs);cursor:pointer;font-size:11px}
.searchbar button:disabled{opacity:.3;cursor:not-allowed}
.searchbar label{font-size:10px;color:var(--t3);display:flex;align-items:center;gap:2px;cursor:pointer;white-space:nowrap}
.searchbar label input{accent-color:var(--g)}

.progress-wrap{height:2px;background:var(--s2);flex-shrink:0;overflow:hidden}
.progress-bar{height:100%;background:var(--g);width:0%;transition:width .3s}
.progress-bar.ind{width:30%;animation:ind 1.2s infinite linear}
@keyframes ind{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

.filterbar{display:flex;align-items:center;gap:5px;padding:4px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--s1)}
.lbl{font-size:9px;color:var(--t3)}
.fc{padding:2px 7px;border-radius:8px;font-size:9px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--t2);transition:all .1s}
.fc.active{border-color:var(--g);background:var(--gd);color:var(--g)}
.fc:hover{border-color:var(--bd2)}
.filterbar input{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:2px 7px;color:var(--t);font-size:10px;width:100px;outline:none}
.filterbar input:focus{border-color:var(--g)}
.meta-info{margin-left:auto;font-size:9px;color:var(--t3);display:flex;gap:6px}

/* Stats */
.stats-row{display:flex;gap:1px;background:var(--bd);border-bottom:1px solid var(--bd);flex-shrink:0}
.sc{flex:1;background:var(--bg);padding:7px 12px}.sc .l{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px}.sc .v{font-size:16px;font-weight:700}.sc .su{font-size:8px;color:var(--t3)}
.sc.cg .v{color:var(--g)}.sc.cr .v{color:var(--r)}.sc.ca .v{color:var(--a)}.sc.cb .v{color:var(--b)}

/* Cloud */
.cloud-row{border-bottom:1px solid var(--bd);padding:5px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;overflow-x:auto}
.cloud-row h4{font-size:9px;color:var(--t3);white-space:nowrap;flex-shrink:0}
.cloud-words{display:flex;gap:3px;flex-wrap:wrap}
.cw{padding:1px 5px;border-radius:3px;cursor:pointer;white-space:nowrap;transition:all .1s}
.cw:hover{opacity:.8}

/* Main layout: list(left) + detail(right) */
.main-area{flex:1;display:grid;grid-template-columns:1fr 380px;overflow:hidden;min-height:0}
@media(max-width:1000px){.main-area{grid-template-columns:1fr 320px}}
.main-area.view-table{grid-template-columns:1fr}

/* Left: full feed list */
.list-panel{display:flex;flex-direction:column;border-right:1px solid var(--bd);overflow:hidden}
.list-head{padding:5px 12px;border-bottom:1px solid var(--bd);font-size:10px;color:var(--t2);display:flex;justify-content:space-between;align-items:center;background:var(--s1);flex-shrink:0}
.list-head .cnt{color:var(--g);font-weight:600}
.list-body{flex:1;overflow-y:auto;padding:2px 4px}

/* Feed item - compact row */
.fi{display:grid;grid-template-columns:4px 1fr auto;gap:0 8px;padding:5px 8px;border-radius:var(--rs);cursor:pointer;transition:background .08s;align-items:center;border-bottom:1px solid var(--bd)}
.fi:hover{background:var(--s1)}.fi.active{background:var(--s2)}
.fi-bar{width:4px;height:100%;border-radius:2px;min-height:20px}
.fi-bar.bp{background:var(--g)}.fi-bar.bn{background:var(--r)}.fi-bar.bu{background:var(--a)}
.fi-main{overflow:hidden;display:flex;align-items:center;gap:6px}
.fi-a{font-size:10px;font-weight:600;color:var(--g);white-space:nowrap;min-width:50px;max-width:70px;overflow:hidden;text-overflow:ellipsis}
.fi-b{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.fi-right{display:flex;align-items:center;gap:8px;font-size:9px;color:var(--t3);white-space:nowrap}
.fi-right .nums{display:flex;gap:4px}
mark{background:var(--ad);color:var(--a);padding:0 1px;border-radius:2px}

/* Tags */
.t{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:600}
.tp{background:var(--gd);color:var(--g)}.tn{background:var(--rd);color:var(--r)}.tu{background:var(--ad);color:var(--a)}.th{background:var(--rd);color:var(--r)}

/* Right: detail + comments stacked */
.right-panel{display:flex;flex-direction:column;overflow:hidden}
.right-panel .section{border-bottom:1px solid var(--bd);overflow-y:auto}
.right-panel .section-head{padding:5px 10px;background:var(--s1);border-bottom:1px solid var(--bd);font-size:10px;color:var(--t2);font-weight:600;display:flex;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:1}
.detail-section{flex:0 0 auto;max-height:45%}
.comment-section{flex:1;min-height:0}
.detail-body{padding:10px 12px;font-size:12px;line-height:1.6}
.detail-body h3{font-size:12px;margin-bottom:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.detail-body .text{color:var(--t);margin-bottom:8px}
.detail-body .mr{display:flex;gap:8px;font-size:10px;color:var(--t2);flex-wrap:wrap;align-items:center;padding-top:6px;border-top:1px solid var(--bd)}
.lnk{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;background:var(--bd3);color:var(--b);border-radius:var(--rs);font-size:9px;text-decoration:none;font-weight:500}
.lnk:hover{background:var(--b);color:#fff}

.ci{padding:5px 8px;border-bottom:1px solid var(--bd)}.ci:last-child{border-bottom:none}
.ci-top{display:flex;justify-content:space-between;align-items:center}
.ci-a{font-size:9px;font-weight:600;color:var(--b)}
.ci-b{font-size:11px;color:var(--t);line-height:1.3;margin:1px 0}
.ci-m{font-size:8px;color:var(--t3);display:flex;gap:5px}
.cmt-sum{padding:4px 10px;background:var(--s1);font-size:9px;color:var(--t2);display:flex;gap:6px;border-bottom:1px solid var(--bd)}

/* Table view */
.table-wrap{flex:1;overflow:auto;padding:8px}
table.dt{width:100%;border-collapse:collapse;font-size:11px}
.dt th{text-align:left;padding:5px 6px;border-bottom:1px solid var(--bd);color:var(--t3);font-size:9px;font-weight:500;position:sticky;top:0;background:var(--bg)}
.dt td{padding:4px 6px;border-bottom:1px solid var(--bd);color:var(--t2);max-width:350px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dt tr:hover td{background:var(--s1)}

/* Chart mini (in stats row area) */
.chart-mini{display:flex;align-items:center;gap:12px;padding:5px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.donut-mini{width:40px;height:40px}
.dleg{font-size:9px;display:flex;gap:8px}
.dleg span::before{content:'';display:inline-block;width:6px;height:6px;border-radius:2px;margin-right:3px;vertical-align:middle}
.lp::before{background:var(--g)}.ln::before{background:var(--r)}.lu::before{background:var(--a)}
.bars-mini{flex:1;display:flex;gap:1px;height:28px;align-items:flex-end}
.bars-mini .b{flex:1;border-radius:1px 1px 0 0;min-width:2px;transition:height .2s}

.empty{text-align:center;padding:20px;color:var(--t3);font-size:11px}
.empty .ico{font-size:20px;margin-bottom:3px}
.loading{text-align:center;padding:16px;color:var(--t3);font-size:11px}
.error{color:var(--r);background:var(--rd);padding:5px 8px;border-radius:var(--rs);font-size:11px;margin:4px}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>🔍 酷安<em>舆论监测</em></h1>
  <div class="topbar-r">
    <button class="btn-s active" data-v="list" onclick="setView('list')">☰ 列表</button>
    <button class="btn-s" data-v="table" onclick="setView('table')">⊞ 表格</button>
    <span class="badge" id="st-b">● 就绪</span>
    <button class="btn-s" onclick="exportCSV()">📥CSV</button>
    <button class="btn-s" onclick="exportJSON()">📋JSON</button>
  </div>
</div>
<div class="searchbar">
  <input id="q" placeholder="多关键词空格分隔（如：HyperOS 卡顿 发热）" autofocus>
  <select id="sort"><option value="default">综合</option><option value="hot">热门</option><option value="time_desc">最新</option></select>
  <select id="pages"><option value="2">40条</option><option value="3" selected>60条</option><option value="5">100条</option></select>
  <label><input type="checkbox" id="chk-cmt" checked>评论</label>
  <button id="btn-go" onclick="doSearch()">监测</button>
</div>
<div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>

<div id="main-content" style="display:none;flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
  <!-- Stats -->
  <div class="stats-row">
    <div class="sc cb"><div class="l">采集</div><div class="v" id="sv-t">0</div><div class="su" id="sv-ts">—</div></div>
    <div class="sc cg"><div class="l">正面</div><div class="v" id="sv-p">0%</div><div class="su" id="sv-pn">0</div></div>
    <div class="sc cr"><div class="l">负面</div><div class="v" id="sv-n">0%</div><div class="su" id="sv-nn">0</div></div>
    <div class="sc ca"><div class="l">中性</div><div class="v" id="sv-u">0%</div><div class="su" id="sv-un">0</div></div>
    <div class="sc"><div class="l">热门</div><div class="v" id="sv-h">0</div><div class="su">互动&gt;50</div></div>
    <div class="sc"><div class="l">判定</div><div class="v" id="sv-v">—</div><div class="su" id="sv-vs"></div></div>
  </div>

  <!-- Chart + Cloud -->
  <div class="chart-mini">
    <svg class="donut-mini" viewBox="0 0 36 36" id="donut"><circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--s2)" stroke-width="4"/></svg>
    <div class="dleg"><span class="lp" id="lp">正0%</span><span class="ln" id="ln">负0%</span><span class="lu" id="lu">中0%</span></div>
    <div class="bars-mini" id="bars"></div>
  </div>

  <div class="cloud-row"><h4>📌话题</h4><div class="cloud-words" id="cloud-topics"></div><span style="color:var(--bd2);margin:0 4px">|</span><h4>💬评价</h4><div class="cloud-words" id="cloud-sentiments"></div></div>

  <!-- Filter -->
  <div class="filterbar">
    <span class="lbl">过滤:</span>
    <span class="fc active" data-f="all" onclick="setFilter('all')">全部</span>
    <span class="fc" data-f="p" onclick="setFilter('p')">🟢正面</span>
    <span class="fc" data-f="n" onclick="setFilter('n')">🔴负面</span>
    <span class="fc" data-f="u" onclick="setFilter('u')">🟡中性</span>
    <span class="fc" data-f="hot" onclick="setFilter('hot')">🔥热门</span>
    <input id="filter-kw" placeholder="筛选..." oninput="applyFilter()">
    <div class="meta-info"><span id="meta-time">—</span><span id="meta-cache"></span></div>
  </div>

  <!-- Main: list + detail -->
  <div class="main-area" id="main-area">
    <div class="list-panel" id="list-panel">
      <div class="list-head"><span>📝 舆情列表</span><span class="cnt" id="f-cnt">0</span></div>
      <div class="list-body" id="f-list"></div>
    </div>
    <div class="right-panel" id="right-panel">
      <div class="section detail-section" id="detail-section">
        <div class="section-head"><span>📄 详情</span><span id="det-tag"></span></div>
        <div class="detail-body" id="det"><div class="empty"><div class="ico">👈</div>选择帖子</div></div>
      </div>
      <div class="section comment-section" id="comment-section">
        <div class="section-head"><span>💬 评论</span><span id="c-cnt">0</span></div>
        <div id="c-sum" class="cmt-sum" style="display:none"></div>
        <div id="c-list"><div class="empty"><div class="ico">💬</div>选帖加载</div></div>
      </div>
    </div>
    <!-- Table (hidden by default) -->
    <div class="table-wrap" id="table-area" style="display:none"></div>
  </div>
</div>

<div id="welcome" style="flex:1;display:flex;align-items:center;justify-content:center">
  <div class="empty"><div class="ico" style="font-size:36px">🔍</div><p style="margin-top:6px;font-size:13px">输入关键词开始舆论监测</p><p style="margin-top:2px;font-size:10px;color:var(--t3)">多关键词 · 词频分析 · 数据缓存 · 防爬限速</p></div>
</div>
</div>

<script>
const $=id=>document.getElementById(id);
// 情感词库 — 短语优先，避免单字误判
// 权重2：强情感词
const POS2=['真香','完美','好评','丝滑','太好用','真的好用','非常流畅','超级流畅','很满意','太满意','强烈推荐','值得买','值得入','良心','神器','省心','给力','靠谱','超赞','吊打','真不错','越来越好'];
const NEG2=['垃圾','辣鸡','割韭菜','智商税','偷工减料','翻车','摆烂','拉跨','恶心','太卡了','卡死了','卡得要死','严重发热','续航尿崩','一天三充','频繁闪退','各种bug','退货','投诉无门'];
// 权重1：一般情感词
const POS1=['好用','流畅','舒服','喜欢','推荐','不错','优秀','满意','惊喜','漂亮','方便','精致','耐用','值得','爽','好看','提升大','手感好','拍照好','续航好'];
const NEG1=['卡顿','很卡','太卡','bug多','发热','耗电快','闪退','崩溃','离谱','难用','后悔','失望','坑','难受','无语','虚标','降频','广告多','阉割','倒退','不如','变差','吃相难看','越来越差'];
// 否定词
const DENY=['不','没','别','无','非','未','莫'];
const POS=[...POS2,...POS1];
const NEG=[...NEG2,...NEG1];
const STOP=['的','了','是','在','我','有','和','就','不','人','都','一','这','中','大','为','上','个','他','也','到','说','你','会','着','没有','看','好','自己','把','那','还','么','被','让','能','对','很','可以','啊','吗','吧','呢','去','过','又','但','其','更多','查看','看更多','查看更多','还是','什么','怎么','现在','已经','比较','可能','应该','感觉','觉得','真的','确实','如果','因为','所以','虽然','而且','或者','但是','不过','这个','那个','然后','一个','不是','没有','开始','关注','回复','点赞','转发','分享','评论','收藏','下载','安装','更新','版本','设置','功能','问题','内容','时候','时间','手机','系统','使用','用户','官方','发布','支持','一下','知道','这样','出来','起来'];

function sent(t){
  if(!t||t.length<6)return'u';
  let p=0,n=0;
  // 强情感词 x2
  POS2.forEach(w=>{if(t.includes(w))p+=2});
  NEG2.forEach(w=>{if(t.includes(w))n+=2});
  // 一般情感词 x1，但检查前面是否有否定词
  POS1.forEach(w=>{const i=t.indexOf(w);if(i>=0){const pre=t.substring(Math.max(0,i-2),i);if(DENY.some(d=>pre.includes(d)))n+=1;else p+=1}});
  NEG1.forEach(w=>{const i=t.indexOf(w);if(i>=0){const pre=t.substring(Math.max(0,i-2),i);if(DENY.some(d=>pre.includes(d)))p+=1;else n+=1}});
  if(p===0&&n===0)return'u';
  if(n>p)return'n';if(p>n)return'p';return'u';
}
function tagH(s){return s==='p'?'<span class="t tp">正面</span>':s==='n'?'<span class="t tn">负面</span>':'<span class="t tu">中性</span>'}
function strip(s){return(s||'').replace(/<[^>]+>/g,'').replace(/&\w+;/g,' ').trim()}
function fmtT(ts){if(!ts)return'';const d=new Date(ts*1000);return(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}
function fmtNow(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}
function hl(text,kw){if(!kw)return text;const ws=kw.split(/\s+/).filter(Boolean);let r=text;ws.forEach(w=>{r=r.replace(new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>')});return r}
function tokenize(text){if(!text)return{};const words={};for(let l=4;l>=2;l--)for(let i=0;i<=text.length-l;i++){const w=text.substring(i,i+l);if(/^[\u4e00-\u9fa5]{2,4}$/.test(w)&&!STOP.includes(w))words[w]=(words[w]||0)+1;}const ks=Object.keys(words);for(const lg of ks){if(lg.length<=2)continue;for(const sh of ks){if(sh.length>=lg.length||sh===lg)continue;if(lg.includes(sh)&&words[sh]<=words[lg]*1.2)delete words[sh];}}for(const k of Object.keys(words))if(words[k]<3)delete words[k];return words;}

let feeds=[],filtered=[],curIdx=-1,curQ='',curFilter='all',curView='list';

function setView(v){curView=v;document.querySelectorAll('[data-v]').forEach(b=>b.classList.toggle('active',b.dataset.v===v));const m=$('main-area');m.classList.toggle('view-table',v==='table');$('list-panel').style.display=v==='table'?'none':'';$('right-panel').style.display=v==='table'?'none':'';$('table-area').style.display=v==='table'?'block':'none';if(v==='table')renderTable();}
function setProgress(p){$('prog').style.width=p+'%';$('prog').classList.remove('ind')}
function setInd(){$('prog').classList.add('ind');$('prog').style.width='30%'}
function clrProg(){$('prog').style.width='0%';$('prog').classList.remove('ind')}
function cooldown(){$('btn-go').disabled=true;setTimeout(()=>{$('btn-go').disabled=false},4000)}

async function doSearch(){
  const q=$('q').value.trim();if(!q)return;cooldown();curQ=q;curFilter='all';if($('filter-kw'))$('filter-kw').value='';
  $('welcome').style.display='none';$('main-content').style.display='flex';
  $('f-list').innerHTML='<div class="loading">⏳ 采集中(限速2-4s/请求)...</div>';
  $('st-b').textContent='● 采集中';$('st-b').style.color='var(--a)';setInd();
  try{
    const kws=q.split(/\s+/).filter(Boolean);
    const r=await fetch('/api/search/all?q='+encodeURIComponent(kws[0])+'&sort='+$('sort').value+'&pages='+$('pages').value+'&type=feed');
    const j=await r.json();if(!j.ok)throw new Error(j.error);
    let items=j.data;
    if(kws.length>1)items=items.filter(f=>{const t=strip(f.message||f.title||'').toLowerCase();return kws.some(k=>t.includes(k.toLowerCase()))});
    feeds=items.map(f=>{const txt=strip(f.message||f.title||'');return{...f,_t:txt,_s:sent(txt),_hot:(parseInt(f.likenum)||0)+(parseInt(f.replynum)||0)>50}});
    filtered=[...feeds];
    $('meta-time').textContent='\u{1F551} '+fmtNow();
    $('meta-cache').textContent=j._cache?(j._stale?'\u21BB刷新':'\u{1F4E6}缓存'):'\u26A1实时';
    $('st-b').textContent=j._cache?'● 缓存':'● 完成';$('st-b').style.color='var(--g)';
    setProgress(100);setTimeout(clrProg,600);renderAll();if(curView==='table')renderTable();
    // 模型情感分析（后台异步，完成后更新）
    aiSentiment();

async function aiSentiment(){
  try{
    const texts=feeds.map(f=>f._t.substring(0,256));
    const r=await fetch("/api/sentiment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(texts)});
    const j=await r.json();
    if(j.ok&&Array.isArray(j.data)&&j.data.length===feeds.length){
      j.data.forEach((s,i)=>{feeds[i]._s=s.label==="positive"?"p":s.label==="negative"?"n":"u";feeds[i]._score=s.score});
      filtered=[...feeds].filter(f=>{if(curFilter==="p"&&f._s!=="p")return false;if(curFilter==="n"&&f._s!=="n")return false;if(curFilter==="u"&&f._s!=="u")return false;if(curFilter==="hot"&&!f._hot)return false;return true});
      renderAll();if(curView==="table")renderTable();
      $("st-b").textContent="● AI分析完成";$("st-b").style.color="var(--g)";
    }
  }catch(e){/* 模型未就绪则用关键词结果 */}
}
  }catch(e){$('f-list').innerHTML='<div class="error">'+e.message+'</div>';$('st-b').textContent='● 异常';$('st-b').style.color='var(--r)';clrProg()}}

function setFilter(f){curFilter=f;document.querySelectorAll('.fc').forEach(c=>c.classList.toggle('active',c.dataset.f===f));applyFilter()}
function applyFilter(){const kw=($('filter-kw')?$('filter-kw').value:'').trim().toLowerCase();filtered=feeds.filter(f=>{if(curFilter==='p'&&f._s!=='p')return false;if(curFilter==='n'&&f._s!=='n')return false;if(curFilter==='u'&&f._s!=='u')return false;if(curFilter==='hot'&&!f._hot)return false;if(kw&&!f._t.toLowerCase().includes(kw))return false;return true});renderFeedList();if(curView==='table')renderTable()}
function filterByWord(w){if($('filter-kw'))$('filter-kw').value=w;applyFilter()}
function renderAll(){renderStats();renderCloud();renderFeedList();renderBars()}

function renderStats(){
  const n=feeds.length,pos=feeds.filter(f=>f._s==='p').length,neg=feeds.filter(f=>f._s==='n').length,neu=n-pos-neg,hot=feeds.filter(f=>f._hot).length;
  $('sv-t').textContent=n;$('sv-ts').textContent='"'+curQ+'"';
  $('sv-p').textContent=n?Math.round(pos/n*100)+'%':'0%';$('sv-pn').textContent=pos+'\u6761';
  $('sv-n').textContent=n?Math.round(neg/n*100)+'%':'0%';$('sv-nn').textContent=neg+'\u6761';
  $('sv-u').textContent=n?Math.round(neu/n*100)+'%':'0%';$('sv-un').textContent=neu+'\u6761';$('sv-h').textContent=hot;
  if(neg>pos*1.5){$('sv-v').textContent='\u26A0\uFE0F\u8D1F\u9762';$('sv-v').style.color='var(--r)';$('sv-vs').textContent='\u9700\u5173\u6CE8'}
  else if(pos>neg*1.5){$('sv-v').textContent='\u2705\u6B63\u9762';$('sv-v').style.color='var(--g)';$('sv-vs').textContent='\u53E3\u7891\u597D'}
  else{$('sv-v').textContent='\u2796\u4E2D\u6027';$('sv-v').style.color='var(--a)';$('sv-vs').textContent='\u6B63\u8D1F\u76F8\u5F53'}
  const pp=n?pos/n*100:0,np=n?neg/n*100:0,up=100-pp-np;let svg='<circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--s2)" stroke-width="4"/>',o=25;
  if(pp>0){svg+='<circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--g)" stroke-width="4" stroke-dasharray="'+pp+' '+(100-pp)+'" stroke-dashoffset="'+o+'"/>';o-=pp}
  if(np>0){svg+='<circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--r)" stroke-width="4" stroke-dasharray="'+np+' '+(100-np)+'" stroke-dashoffset="'+o+'"/>';o-=np}
  if(up>0){svg+='<circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--a)" stroke-width="4" stroke-dasharray="'+up+' '+(100-up)+'" stroke-dashoffset="'+o+'"/>'}
  $('donut').innerHTML=svg;$('lp').textContent='\u6B63'+Math.round(pp)+'%';$('ln').textContent='\u8D1F'+Math.round(np)+'%';$('lu').textContent='\u4E2D'+Math.round(up)+'%';
}

function renderCloud(){
  const allText=feeds.map(f=>f._t).join('');
  const freq=tokenize(allText);
  curQ.split(/\s+/).forEach(k=>{delete freq[k]});
  const evalWords=[...POS,...NEG];
  const evalFreq={},topicFreq={};
  for(const[w,c]of Object.entries(freq)){
    if(evalWords.some(e=>w.includes(e)||e.includes(w)))evalFreq[w]=c;
    else topicFreq[w]=c;
  }
  POS.forEach(w=>{const m=allText.match(new RegExp(w,'g'));if(m&&m.length>=2)evalFreq[w]=(evalFreq[w]||0)+m.length});
  NEG.forEach(w=>{const m=allText.match(new RegExp(w,'g'));if(m&&m.length>=2)evalFreq[w]=(evalFreq[w]||0)+m.length});
  const topics=Object.entries(topicFreq).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const tMax=topics.length?topics[0][1]:1;
  $('cloud-topics').innerHTML=topics.map(([w,c])=>{const sz=Math.max(10,Math.min(14,10+4*(c/tMax)));return'<span class="cw" style="font-size:'+sz+'px;color:var(--b);background:var(--bd3)" onclick="filterByWord(\''+w+'\')">'+w+'<sup style="font-size:7px;opacity:.5">'+c+'</sup></span>'}).join('');
  const evals=Object.entries(evalFreq).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const eMax=evals.length?evals[0][1]:1;
  $('cloud-sentiments').innerHTML=evals.map(([w,c])=>{const sz=Math.max(10,Math.min(14,10+4*(c/eMax)));const isN=NEG.includes(w);const col=isN?'var(--r)':'var(--g)';const bg=isN?'var(--rd)':'var(--gd)';return'<span class="cw" style="font-size:'+sz+'px;color:'+col+';background:'+bg+'" onclick="filterByWord(\''+w+'\')">'+w+'<sup style="font-size:7px;opacity:.5">'+c+'</sup></span>'}).join('');
}

function renderBars(){
  const sorted=[...feeds].sort((a,b)=>(a.dateline||0)-(b.dateline||0));if(!sorted.length){$('bars').innerHTML='';return}
  const mx=Math.max(...sorted.map(f=>(parseInt(f.likenum)||0)+(parseInt(f.replynum)||0)),1);
  $('bars').innerHTML=sorted.map(f=>{const v=(parseInt(f.likenum)||0)+(parseInt(f.replynum)||0);const h=Math.max(2,v/mx*100);const c=f._s==='p'?'var(--g)':f._s==='n'?'var(--r)':'var(--a)';return'<div class="b" style="height:'+h+'%;background:'+c+'"></div>'}).join('');
}

function renderFeedList(){
  $('f-cnt').textContent=filtered.length+'/'+feeds.length;
  $('f-list').innerHTML=filtered.map(function(f,i){
    var ri=feeds.indexOf(f);
    return '<div class="fi'+(ri===curIdx?' active':'')+'" onclick="selFeed('+ri+')"><div class="fi-bar b'+f._s+'"></div><div class="fi-main"><span class="fi-a">'+(f.username||'\u533F\u540D')+'</span><span class="fi-b">'+hl(f._t.substring(0,80),curQ)+'</span></div><div class="fi-right">'+(f._hot?'\u{1F525}':'')+'<span class="nums">\u2764\uFE0F'+(f.likenum||0)+' \u{1F4AC}'+(f.replynum||0)+'</span><span>'+fmtT(f.dateline)+'</span></div></div>';
  }).join('');
}

function renderTable(){
  var data=filtered.length?filtered:feeds;
  $('table-area').innerHTML='<table class="dt"><thead><tr><th>\u60C5\u611F</th><th>\u4F5C\u8005</th><th>\u5185\u5BB9</th><th>\u2764\uFE0F</th><th>\u{1F4AC}</th><th>\u65F6\u95F4</th><th>\u94FE\u63A5</th></tr></thead><tbody>'+data.map(function(f){return '<tr><td><span class="fi-bar b'+f._s+'" style="display:inline-block;width:4px;height:12px;border-radius:2px;vertical-align:middle"></span> '+({p:'\u6B63',n:'\u8D1F',u:'\u4E2D'})[f._s]+'</td><td style="color:var(--g)">'+(f.username||'')+'</td><td title="'+f._t+'">'+hl(f._t.substring(0,80),curQ)+'</td><td>'+(f.likenum||0)+'</td><td>'+(f.replynum||0)+'</td><td>'+fmtT(f.dateline)+'</td><td><a class="lnk" href="https://www.coolapk.com/feed/'+f.id+'" target="_blank">\u2197</a> <a class="lnk" href="coolapk://feed/detail?id='+f.id+'" style="background:var(--gd);color:var(--g)">App</a></td></tr>'}).join('')+'</tbody></table>';
}

async function selFeed(i){
  curIdx=i;var f=feeds[i];
  document.querySelectorAll('.fi').forEach(function(el){var m=el.getAttribute('onclick').match(/\d+/);el.classList.toggle('active',m&&parseInt(m[0])===i)});
  $('det').innerHTML='<h3>'+(f.username||'\u533F\u540D')+' '+tagH(f._s)+(f._hot?' <span class="t th">\u{1F525}</span>':'')+'</h3><div class="text">'+hl(f._t,curQ)+'</div><div class="mr"><span>\u2764\uFE0F'+(f.likenum||0)+'</span><span>\u{1F4AC}'+(f.replynum||0)+'</span><span>\u{1F517}'+(f.sharenum||0)+'</span><span>\u{1F4C5}'+fmtT(f.dateline)+'</span><a class="lnk" href="https://www.coolapk.com/feed/'+f.id+'" target="_blank">\u2197 Web</a><a class="lnk" href="coolapk://feed/detail?id='+f.id+'" style="background:var(--gd);color:var(--g)">\u{1F4F1} App</a></div>';
  $('det-tag').innerHTML=tagH(f._s);
  if($('chk-cmt').checked&&f.id){
    $('c-list').innerHTML='<div class="loading">\u52A0\u8F7D\u8BC4\u8BBA...</div>';$('c-sum').style.display='none';
    try{var r=await fetch('/api/feed/replies?id='+f.id+'&sort=hot');var j=await r.json();
      if(j.ok&&j.data&&j.data.length)renderCmts(j.data);
      else $('c-list').innerHTML='<div class="empty">'+((j.error||'').includes('\u9A8C\u8BC1\u7801')?'\u26A0\uFE0F \u98CE\u63A7\u4E2D\uFF0C\u7A0D\u540E\u91CD\u8BD5':j.error||'\u6682\u65E0\u8BC4\u8BBA')+'</div>';
    }catch(e){$('c-list').innerHTML='<div class="error">'+e.message+'</div>'}
  }
}

function renderCmts(cmts){
  var cp=0,cn=0;
  var html=cmts.map(function(c){var t=strip(c.message);var s=sent(t);if(s==='p')cp++;if(s==='n')cn++;
    return '<div class="ci"><div class="ci-top"><span class="ci-a">'+(c.username||'\u533F\u540D')+'</span>'+tagH(s)+'</div><div class="ci-b">'+hl(t.substring(0,120),curQ)+'</div><div class="ci-m"><span>\u2764\uFE0F'+(c.likenum||0)+'</span><span>'+fmtT(c.dateline)+'</span></div></div>'}).join('');
  $('c-cnt').textContent=cmts.length;$('c-sum').style.display='flex';
  $('c-sum').innerHTML='<span style="color:var(--g)">\u6B63'+cp+'</span><span style="color:var(--r)">\u8D1F'+cn+'</span><span style="color:var(--a)">\u4E2D'+(cmts.length-cp-cn)+'</span>';
  $('c-list').innerHTML=html;
}

function exportCSV(){if(!feeds.length)return;var h='\u4F5C\u8005,\u5185\u5BB9,\u60C5\u611F,\u70B9\u8D5E,\u56DE\u590D,\u65F6\u95F4,\u94FE\u63A5\n';var rows=feeds.map(function(f){return '"'+(f.username||'')+'","'+f._t.replace(/"/g,'""').substring(0,200)+'","'+({p:'\u6B63\u9762',n:'\u8D1F\u9762',u:'\u4E2D\u6027'})[f._s]+'",'+(f.likenum||0)+','+(f.replynum||0)+',"'+fmtT(f.dateline)+'","https://www.coolapk.com/feed/'+f.id+'"'}).join('\n');dl(h+rows,'coolapk_'+curQ+'.csv','text/csv')}
function exportJSON(){if(!feeds.length)return;dl(JSON.stringify(feeds.map(function(f){return{author:f.username,content:f._t.substring(0,300),sentiment:({p:'positive',n:'negative',u:'neutral'})[f._s],likes:+f.likenum||0,replies:+f.replynum||0,time:fmtT(f.dateline),url:'https://www.coolapk.com/feed/'+f.id}}),null,2),'coolapk_'+curQ+'.json','application/json')}
function dl(c,n,t){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click()}
$('q').addEventListener('keydown',function(e){if(e.key==='Enter'&&!$('btn-go').disabled)doSearch()});
</script>
